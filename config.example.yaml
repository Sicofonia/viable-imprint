# API keys are loaded from .env (MISTRAL_API_KEY, DEEPL_API_KEY)
# This file contains only non-secret settings and is safe to commit.

llm:
  provider: mistral
  # mistral-medium-latest is the default: running an entire book plus every
  # System 1D/System 4 task through mistral-large-latest burns tokens far
  # faster than the quality difference justifies for this pipeline's editorial
  # and marketing tasks. This applies to every task — there's no per-task
  # model override yet (unlike temperature/max_chars, see tasks.yaml), so
  # switching back to large means changing this one line.
  model: mistral-medium-latest
  # 0.0 = most deterministic / least creative. Recommended for editorial tasks
  # (cleanup, ortho, copyedit) where fidelity to the source text matters more
  # than fluency. Raise it only if output feels too rigid.
  temperature: 0.0
  # Optional — System 3's `s3 dashboard` (ADR 005) uses this to turn captured
  # token counts into a cost figure. Omit this block entirely to skip cost
  # calculation; duration and token counts are captured either way. Prices
  # change over time and by account tier — these are illustrative placeholders
  # only, not verified current figures. Confirm against your own Mistral
  # account/plan before trusting the dashboard's cost column.
  pricing:
    prompt_per_million: 0.40
    completion_per_million: 2.00

translation:
  provider: deepl
  source_lang: EN
  target_lang: ES
  # Optional, same caveat as llm.pricing above — DeepL Pro API pricing is
  # per-character; confirm your own plan's current rate before trusting it.
  pricing:
    per_million_characters: 20.00

s3:
  # Optional — System 3's `s3 dashboard` (ADR 010) uses this to flag
  # portfolio outliers. Omit either field, or the whole block, to skip that
  # flagging entirely; the dashboard still shows every number either way.
  # Both are peer-comparison multipliers against the current portfolio's own
  # average, not a budget: "this book/task costs N times more than the rest
  # of the portfolio typically does," nothing more.
  deviation:
    cost_multiplier: 3.0
    duration_multiplier: 3.0

books_dir: books

# Root folder for System 4 (Strategic Intelligence) — not book-scoped, so it
# lives outside books_dir. Structured like a book internally (its own
# manifest.yaml, s4/ subfolder) — see docs/adr/003-system-4-strategic-intelligence.md.
intelligence_dir: intelligence

# Root folder for candidates under System 5 policy evaluation (ADR 006) — not
# book-scoped either, same reasoning as intelligence_dir: a text under
# evaluation has no editorial commitment behind it yet, so it doesn't belong
# under books_dir.
candidates_dir: candidates

# Root folder for System 5's homeostat pipeline (ADR 007) — the S3/S4
# confrontation dashboard. Not book-scoped, same reasoning as intelligence_dir
# and candidates_dir.
homeostat_dir: homeostat

# Root folder for System 1D's monthly newsletter pipeline (ADR 008) — not
# book-scoped either: calendar-driven and catalog-wide, same reasoning as
# intelligence_dir/candidates_dir/homeostat_dir.
newsletter_dir: newsletter
